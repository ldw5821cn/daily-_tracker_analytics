<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多板块 ETF 每日投资分析报告</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9;
    max-width: 900px; margin: 0 auto; padding: 40px 20px;
  }
  h1 { color: #58a6ff; font-size: 1.8em; margin-bottom: 8px; }
  .subtitle { color: #8b949e; margin-bottom: 30px; font-size: 0.95em; }
  .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
  .stat-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 16px 24px; flex: 1; min-width: 120px;
  }
  .stat-card .num { font-size: 1.5em; font-weight: 600; color: #58a6ff; }
  .stat-card .label { font-size: 0.8em; color: #8b949e; margin-top: 4px; }
  .date-group { margin-bottom: 24px; }
  .date-header {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px 8px 0 0;
    padding: 12px 16px; font-weight: 600; color: #f0f6fc;
    display: flex; justify-content: space-between; align-items: center;
  }
  .date-header .badge { font-size: 0.75em; color: #8b949e; font-weight: normal; }
  .report-list { list-style: none; }
  .report-item {
    border: 1px solid #30363d; border-top: none;
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
    transition: background 0.2s;
  }
  .report-item:last-child { border-radius: 0 0 8px 8px; }
  .report-item:hover { background: #1c2128; }
  .report-item a { color: #58a6ff; text-decoration: none; }
  .report-item a:hover { text-decoration: underline; }
  .report-item .meta { font-size: 0.85em; color: #8b949e; }
  .report-item .latest { background: #238636; color: #fff; font-size: 0.7em;
    padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .footer { text-align: center; color: #484f58; font-size: 0.8em; margin-top: 40px;
    padding-top: 20px; border-top: 1px solid #21262d; }
  .loading { color: #8b949e; text-align: center; padding: 60px 0; }
  @media (max-width: 600px) {
    .stats { flex-direction: column; }
    .report-item { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>
<h1>📊 多板块 ETF 投资分析报告</h1>
<p class="subtitle">基于 TickFlow + 多模型预测 + LLM 决策的 28 只 ETF 每日跟踪</p>
<div class="stats" id="stats"></div>
<div id="reportList"><div class="loading">⏳ 加载报告中...</div></div>
<div class="footer">
  <p>报告自动生成 | 数据来源: TickFlow + AkShare + 东方财富 + NewsAPI</p>
  <p>GitHub: <a href="https://github.com/ldw5821cn/daily_tracker_analytics" style="color:#58a6ff">ldw5821cn/daily_tracker_analytics</a></p>
</div>

<script>
async function loadReports() {
  try {
    // 通过 GitHub API 获取 docs/reports/ 的目录结构
    const api = 'https://api.github.com/repos/ldw5821cn/daily_tracker_analytics/contents/docs/reports';
    const resp = await fetch(api);
    const items = await resp.json();
    if (!Array.isArray(items)) throw new Error('Unexpected response');
    
    // 筛选日期文件夹（YYYY-MM-DD）
    const dateDirs = items.filter(i => i.type === 'dir' && /^\d{4}-\d{2}-\d{2}$/.test(i.name))
                         .sort((a, b) => b.name.localeCompare(a.name));
    
    // 统计
    let totalReports = 0;
    let latestReport = '';
    
    let html = '';
    for (const dir of dateDirs) {
      const dirResp = await fetch(dir.url);
      const dirFiles = await dirResp.json();
      const reports = Array.isArray(dirFiles) ? dirFiles.filter(f => f.name.startsWith('multi_etf_report_') && f.name.endsWith('.md'))
                                               : [];
      totalReports += reports.length;
      
      if (reports.length === 0) continue;
      
      // 排序：按编号大小
      reports.sort((a, b) => b.name.localeCompare(a.name));
      
      if (!latestReport && reports.length > 0) {
        latestReport = reports[0].download_url;
      }
      
      html += `<div class="date-group">`;
      html += `<div class="date-header">📅 ${dir.name} <span class="badge">${reports.length} 份报告</span></div>`;
      html += `<ul class="report-list">`;
      
      for (const r of reports) {
        const seq = r.name.replace('multi_etf_report_', '').replace('.md', '');
        const size = r.size ? `${(r.size / 1024).toFixed(0)} KB` : '';
        const isLatest = r.download_url === latestReport;
        const mdUrl = r.download_url.replace('raw.githubusercontent.com', 'github.com').replace('/docs/reports/', '/blob/main/docs/reports/');
        html += `<li class="report-item">
          <a href="${mdUrl}" target="_blank">第 ${seq} 期报告</a>
          <div class="meta">${size} ${isLatest ? '<span class="latest">最新</span>' : ''}</div>
        </li>`;
      }
      
      html += `</ul></div>`;
    }
    
    document.getElementById('reportList').innerHTML = html || '<p style="color:#8b949e">暂无报告</p>';
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="num">${dateDirs.length}</div><div class="label">交易日</div></div>
      <div class="stat-card"><div class="num">${totalReports}</div><div class="label">总报告数</div></div>
      <div class="stat-card"><div class="num">28</div><div class="label">跟踪 ETF</div></div>
      <div class="stat-card"><div class="num">6</div><div class="label">数据源</div></div>
    `;
  } catch(e) {
    document.getElementById('reportList').innerHTML = `
      <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:24px;text-align:center">
        <p style="color:#f85149">⚠️ 无法加载报告列表</p>
        <p style="color:#8b949e;margin-top:8px;font-size:0.9em">
          请直接在 GitHub 上查看：
          <a href="https://github.com/ldw5821cn/daily_tracker_analytics/tree/main/docs/reports" style="color:#58a6ff">
            reports 目录
          </a>
        </p>
      </div>
    `;
    console.error(e);
  }
}
loadReports();
</script>
</body>
</html>
